<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
    font-family: "WithMyWoes";
    src: url("./WithMyWoes.ttf") format("truetype");
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.loading {
    font-family: "WithMyWoes", sans-serif;
    color: white;
    font-size: 64px;
    text-align: center;
}
.dots {
    display: inline-block;
    width: 1.5em;
    text-align: left;
}

.dots span {
    opacity: 0;
    animation: dotBlink 1.5s infinite;
}

.dots span:nth-child(1) {
    animation-delay: 0s;
}

.dots span:nth-child(2) {
    animation-delay: 0.5s;
}

.dots span:nth-child(3) {
    animation-delay: 1s;
}

@keyframes dotBlink {
    0%, 20% {
        opacity: 0;
    }

    40%, 100% {
        opacity: 1;
    }
}
</style>
</head>
<body>
<div class="loading">
    Please Wait<span class="dots">
        <span>.</span>
        <span>.</span>
        <span>.</span>
    </span>
</div>
</body>
</html>
