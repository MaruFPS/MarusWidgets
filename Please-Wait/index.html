<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
    font-family: "WithMyWoes";
    src: url("./WithMyWoes.ttf") format("truetype");
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.loading {
    font-family: "WithMyWoes", sans-serif;
    color: white;
    font-size: 64px;
    text-shadow: 0 0 8px black;
}
</style>
</head>

<body>
<div class="loading" id="loading"></div>

<script>
const text = "Please Wait";
let index = 0;
const loading = document.getElementById("loading");

function typeText() {
    loading.textContent = text.slice(0, index);
    index++;

    if (index > text.length) {
        index = 0;
    }
}

setInterval(typeText, 200);
</script>
</body>
</html>
